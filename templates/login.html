{% extends 'base.html' %}
{% block title %}登录 - 新生报到助手{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">
                        <i class="fas fa-sign-in-alt text-primary"></i> 登录
                    </h2>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">学号/用户名</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <div class="alert alert-danger d-none" id="errorMsg"></div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt"></i> 登录
                        </button>
                    </form>
                    <hr>
                    <p class="text-center">
                        还没有账号？<a href="/register/">立即注册</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    
    try {
        const response = await axios.post('/api/auth/login/', { username, password });
        localStorage.setItem('access_token', response.data.access);
        localStorage.setItem('refresh_token', response.data.refresh);
        alert('登录成功！');
        window.location.href = '/student/dashboard/';
    } catch (error) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = error.response?.data?.detail || '登录失败，请检查账号密码';
        errorMsg.classList.remove('d-none');
    }
});
</script>
{% endblock %}
